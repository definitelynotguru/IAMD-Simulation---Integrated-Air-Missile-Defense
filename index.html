<script>
// =============================================================================
// IAMD SIMULATION — v2.3.1 — SLS Tiered Defense + Engagement Zones + preferredThreats
// View: 2D Side View (Range × Altitude range-height display)
// Threats: Ballistic, Cruise, Hypersonic Glide, Drone Swarm
// Guidance: Proportional Navigation  →  a_m = N · V_c · (dθ/dt)
// Tracking: Simplified 2D Kalman Filter on noisy radar returns
// =============================================================================
// CHANGELOG v1.1:
//   - HGV RCS increased 0.08 → 0.15 (detectable at medium range)
//   - Added fast-interceptor (THAAD-class) for hypersonic threats (spd 10.5)
//   - C2 prioritizes fast movers with early engagement & reduced cooldown
//   - HGV target kill rate balanced to ~40-60% (hard but not invincible)
// CHANGELOG v1.2 — ROOT CAUSE FIX:
//   - BUG: HGVs entered at y=123px, ground radars at y=560px → slant range
//     437px > radar max 290px. Detection probability was ZERO, not just low.
//   - Added elevated Early-Warning (EW) radar at mid-altitude (range 500px)
//   - Lowered HGV entry altitude (0.22 → 0.38 of SIM_H)
//   - Steeper HGV glide slope (vy 0.7 → 1.2, gravity 0.005 → 0.008)
//   - Stronger evasive wobble (0.04-0.14 → 0.3-0.8) to compensate
//   - EW radar feeds tracks into C2 for early interceptor launch
// CHANGELOG v1.4 — 8 BUG FIXES:
//   1. Kalman covariance order-of-operations: save Pxv before mutation to fix
//      velocity variance update dependency bug.
//   2. Interceptor lifetime cap: INT_MAX_AGE=300 prevents missed interceptors
//      from flying forever and accumulating in memory.
//   3. Leakage dead zone: threats now leak at battery position (87% SIM_W)
//      instead of SIM_W-3, which was past the self-kill boundary.
//   4. Swept-volume collision: use dedicated prevX/prevY fields instead of
//      trail (which stored pre-movement position, not previous frame position).
//   5. C2 double-launch prevention: add newly-assigned tracks to engaged set
//      within the same runC2() cycle to prevent duplicate interceptor launches.
//   6. Collision double-kill: break inner loop after intercept so a dead threat
//      can't be matched by another interceptor in the same frame.
//   7. Ballistic missile trajectory: lower peak altitude (0.55→0.40) and boost
//      horizontal speed (×1.2) so ballistic missiles actually reach defended zone.
//   8. Render order: re-filter dead objects after checkCollisions() and before
//      drawing, so killed threats/interceptors don't render for one extra frame.
// CHANGELOG v1.3 — ENGAGEMENT GEOMETRY FIX:
//   - BUG: Interceptors launched with vx=0, vy=-speed (straight up) from x=730.
//     PN guidance couldn't build LOS rate fast enough → zero intercepts.
//   - Interceptors now launch TOWARD predicted intercept point (lead calculation).
//     PN guidance refines the trajectory after initial aim.
//   - Kill radius increased 16 → 24px to prevent fast-closing overshoot.
//   - Added swept-volume collision check (line-segment closest-point test).
//   - Gravity increased 0.009 → 0.025 for visible parabolic ballistic arcs.
//   - Track crosshairs enlarged (14px → 24px) with pulsing animation.
// CHANGELOG v1.5 — BUG FIXES (auto-fixed 2026-03-07):
//   - [HIGH-1] PN Vc clamping: max(Vc,1.0) → max(abs(Vc),0.5). Negative
//     closing velocity no longer inverts lateral guidance acceleration.
//   - [MED-1] kf.predict() moved to per-frame draw() loop for all tracks.
//     Fixes ~80-frame drone engagement delay; covariance grows correctly.
//   - [MED-2] prevLOS updated before rMag<0.5 early-return. Eliminates
//     2-frame LOS-rate spike at terminal approach causing last-instant misses.
//   - [MED-3] kf.age threshold already correct (isHypersonic?4:2) — no change.
// CHANGELOG v1.6 — BUG FIXES (auto-fixed 2026-03-07):
//   - [CRITICAL-1] Screen shake translate() wrapped in push()/pop(): was
//     accumulating the transform matrix every shake frame → canvas drift.
//   - [HIGH-2] EW radar detection ellipse clipped to SIM_H: was bleeding
//     240px below ground into the right-side panel area.
//   - [HIGH-3] Interceptor aim clamp dead code fixed: `aim < -Math.PI`
//     (impossible from atan2) replaced with `aim < -Math.PI*0.98`.
//   - [MEDIUM-2] Kalman predict/update order corrected: kf.predict() now
//     runs BEFORE radar.update() (standard predict→update Kalman cycle).
//   - [MEDIUM-4] Screen shake viewport-clipped: right-side panel no longer
//     shakes (drawingContext.clip to SIM_W before sim drawing).
// =============================================================================
// CHANGELOG v2.1 — BUG HUNT FIXES (auto-fixed 2026-03-08):
//   HIGH:
//   - [H1] Ghost Track Memory Leak: prune radar tracks for dead threats after
//     filtering. Prevents 63%% ghost track accumulation, fixes M9 ghost engagement.
//   - [H2] Kalman Covariance Positive-Definiteness: floor Pp/Pv to 1e-6 in both
//     predict() and update() to prevent numerical drift to negative values.
//   - [H3] PN Guidance Vc Floor: self-destruct interceptor on overshoot (Vc < 0)
//     instead of wrong-way steering from max(abs(Vc), 0.5).
//   - [H4] Boids Zero-Distance Division: guard changed from d > 0 to d > 0.1
//     to prevent near-infinity forces at very small separations.
//   MEDIUM:
//   - [M1] predict() covariance floor strengthened to 1e-6 (was 0.01).
//   - [M2] Interceptor velocity normalization guard increased from 0.01 to 1.0.
//   - [M3] Explosion particles capped at 800 to prevent unbounded growth.
//   - [M4] EW Radar sweep line clipping: division-by-zero guard added.
//   - [M5] Afterglow trail clipping: division-by-zero guard added.
//   - [M6] C2 threats.find() O(n) replaced with Map O(1) lookup.
//   - [M7] drawPanel threats.find() O(n*m) replaced with Map O(1) lookup.
//   - [M8] FPS: resolved by H1 + M6/M7 fixes (ghost tracks + O(n) lookups).
//   - [M9] Ghost engagement: resolved by H1 fix (track pruning).
//   LOW:
//   - [L1] KalmanTrack.speed: sqrt() changed to Math.sqrt() for safety.
//   - [L2] Lead damping 0.6 magic number moved to CFG.LEAD_DAMPING.
// CHANGELOG v2.3.1 — PN GUIDANCE BUG HUNT FIXES (auto-fixed 2026-03-08):
//   HIGH:
//   - [H1] PN losRate not divided by dt: LOS angular rate was frame-rate-dependent.
//     Now computed as dTheta/dt for consistent guidance regardless of frame rate.
//   - [H2] PN acceleration impulse not scaled by dt: velocity change from PN accel
//     was applied as instantaneous impulse. Now multiplied by dt for proper integration.
//   - [H3] prevX/prevY stale on early return (rMag<0.5): swept-volume collision check
//     used 2+ frame old positions. Now updates prevX/prevY before early return.
//   - [H4] Vc<0 self-destruct bypasses SLS: overshoot silently killed interceptor.
//     Now triggers SLS step-down so C2 can re-engage the threat at next tier.
//   - [H5] Ghost-pruned track stale guidance: after ghost pruning removed a track,
//     interceptors continued guiding on frozen coordinates. Now detects orphaned tracks
//     and triggers SLS re-engagement for clean handoff.
//   - [L3] Screen shake push()/pop() verified already correct.
//   - [L4] killFeed mutation separated from render (drawPanel) to update phase.
//   - [L5] Delta-time calculation added (capped at 3x, 60fps baseline).
//   - [L6] First PN frame losRate=0: informational, no fix needed.
// =============================================================================

// ── ALL TUNABLE PARAMETERS LIVE HERE — never scatter magic numbers ────────────
const CFG = {
  // Canvas layout
  W: 1100, H: 600,        // total canvas (px)
  SIM_W: 840, SIM_H: 560, // simulation viewport
  // World scale: sim area represents 500 km range × 80 km altitude
  RANGE_KM: 500, ALT_KM: 80,

  // Physics
  GRAVITY_PX: 0.025,      // IMPROVED v1.3: stronger gravity for visible parabolic arcs (was 0.009)

  // Radar — detection probability model:
  // P_detect = 1 / (1 + (R/R_max)^4) × (σ/σ_nom)
  RADAR_RANGE_PX: 290,    // maximum detection range in sim-pixels — ground radars
  RADAR_SIGMA_NOM: 1.0,   // reference RCS value (m²) for probability calc

  // IMPROVED v1.2: Elevated early-warning radar for high-altitude threats
  // Ground radars can't see HGVs at 60km altitude (slant range ~437px > 290px max).
  // This simulates an elevated/airborne early-warning sensor (like AN/TPY-2 in
  // forward-deployed mode or an airborne radar on a high-altitude platform).
  EW_RADAR_RANGE_PX: 500,     // much longer detection range (early warning)
  EW_RADAR_ALT_FRAC: 0.50,    // placed at mid-altitude (simulates elevated platform)
  EW_RADAR_X_FRAC: 0.50,      // centered downrange
  EW_RADAR_SIGMA_NOM: 1.0,    // same RCS normalization
  KALMAN_Q: 0.03,         // process noise covariance (model uncertainty)
  KALMAN_R: 9.0,          // measurement noise covariance (radar error)

  // Interceptors — legacy values retained for compatibility with existing HUD strings
  PN_N: 4,
  INT_SPEED: 7.5,
  INT_MAX_ACCEL: 1.3,
  FAST_INT_SPEED: 10.5,
  FAST_INT_MAX_ACCEL: 1.0,
  FAST_INT_PN_N: 5,
  HYPERSONIC_SPD_THRESH: 5.5,

  KILL_RADIUS: 24,
  INT_MAX_AGE: 300,       // interceptor self-destructs after 300 frames (~5s) if no hit

  // Layered defense doctrine — three engagement tiers with per-tier performance and inventory
  INT_TIERS: {
    UPPER: {
      key: 'UPPER',
      label: 'UPPER',
      zoneLabel: 'HIMEZ',
      color: [255, 100, 100],
      trailColor: [255, 80, 80, 120],
      speed: 14,
      accelMax: 0.25,
      navConst: 3.5,
      sspk: 0.80,
      magazine: 8,
      killRadius: 30,
      engageAltMin: 0.35,
      engageAltMax: 0.0,
      engageYMinFrac: 0.00,
      engageYMaxFrac: 0.35,
      preferredThreats: ['ballistic', 'hypersonic'],
    },
    MIDDLE: {
      key: 'MIDDLE',
      label: 'MIDDLE',
      zoneLabel: 'LOMEZ',
      color: [100, 200, 255],
      trailColor: [100, 180, 255, 120],
      speed: 10,
      accelMax: 0.45,
      navConst: 4.0,
      sspk: 0.75,
      magazine: 12,
      killRadius: 24,
      engageAltMin: 0.65,
      engageAltMax: 0.25,
      engageYMinFrac: 0.35, // FIX MEDIUM-1: was 0.25, causing 56px overlap with UPPER band
      engageYMaxFrac: 0.65,
      preferredThreats: ['cruise', 'ballistic', 'hypersonic'],
    },
    LOWER: {
      key: 'LOWER',
      label: 'LOWER',
      zoneLabel: 'SHORADEZ',
      color: [100, 255, 100],
      trailColor: [80, 255, 80, 120],
      speed: 7,
      accelMax: 0.8,
      navConst: 5.0,
      sspk: 0.70,
      magazine: 18,
      killRadius: 18,
      engageAltMin: 1.0,
      engageAltMax: 0.55,
      engageYMinFrac: 0.65, // FIX MEDIUM-1: was 0.55, causing 56px overlap with MIDDLE band
      engageYMaxFrac: 1.00,
      preferredThreats: ['drone', 'cruise'],
    },
  },
  TIER_ORDER: ['UPPER', 'MIDDLE', 'LOWER'],
  ASSESS_DELAY: 15,           // frames for SLS look phase before re-engaging down a layer
  SLS_ASSESS_DELAY: 15,       // alias — frames to wait after intercept attempt

  // Threat speeds (px/frame — faster = harder to intercept)
  SPD_BALLISTIC:  3.2,
  SPD_CRUISE:     1.8,
  SPD_HYPERSONIC: 6.8,
  SPD_DRONE:      1.3,

  // Boids parameters for drone swarm AI
  BOID_SEP: 22,
  BOID_ALIGN: 50,
  BOID_COH: 60,

  // Game pacing
  WAVE_MS: 9000,
  MAX_LEAKAGE: 10,

  // Interceptor battery position (right side, protected zone)
  BATT_X_FRAC: 0.87,

  // C2 timing
  C2_STD_COOLDOWN: 20,
  C2_FAST_COOLDOWN: 10,
  C2_ENGAGE_RANGE_FRAC: 0.18,
  C2_EARLY_ENGAGE_FRAC: 0.10,

  // FIX v2.1-L2: Lead damping factor for initial interceptor aim (was magic 0.6)
  LEAD_DAMPING: 0.6,
};

// ── WORLD ↔ CANVAS COORDINATE TRANSFORMS ─────────────────────────────────────
// World:  rangeKm ∈ [0, 500],  altKm ∈ [0, 80]  (altKm=0 is ground)
// Canvas: x ∈ [0, SIM_W],      y ∈ [0, SIM_H]   (y=0 is top of screen)
// Threats fly LEFT→RIGHT; altitude increases upward (y decreases on canvas).
const scX = () => CFG.SIM_W / CFG.RANGE_KM; // px per km (range)
const scY = () => CFG.SIM_H / CFG.ALT_KM;   // px per km (altitude)

// ── SIMPLIFIED DECOUPLED KALMAN FILTER ───────────────────────────────────────
// Tracks one axis (position + velocity) using two-state Kalman equations.
//
// State:      x̂ = [pos, vel]
// Prediction: x̂_k|k-1 = F · x̂_k-1  where F = [[1,1],[0,1]]
//             P_k|k-1  = F · P · Fᵀ + Q
// Update:     K = P · Hᵀ · (H·P·Hᵀ + R)⁻¹   H = [1, 0]
//             x̂ = x̂ + K · (z − H·x̂)
//             P = (I − K·H) · P
class KF1D {
  constructor(initPos) {
    this.pos = initPos;
    this.vel = 0;
    this.Pp = 100;  // position variance (high init = high uncertainty)
    this.Pv = 10;   // velocity variance
    this.Pxv = 0;   // cross-covariance position-velocity
  }
  predict(dt = 1) {
    // FIX: Use real elapsed dt instead of hardcoded 1.
    // New position estimate: pos += vel * dt (constant-velocity model)
    this.pos += this.vel * dt;
    // Propagate covariance through F = [[1,dt],[0,1]]:
    const q = CFG.KALMAN_Q * dt;  // scale process noise with dt
    const newPp  = this.Pp + 2 * dt * this.Pxv + dt * dt * this.Pv + q;
    const newPxv = this.Pxv + dt * this.Pv;
    const newPv  = this.Pv + q;
    this.Pp = newPp; this.Pxv = newPxv; this.Pv = newPv;
    // FIX v2.1-H2/M1: Floor Pp/Pv to 1e-6 to enforce positive-definiteness in predict()
    this.Pp = Math.max(this.Pp, 1e-6);
    this.Pv = Math.max(this.Pv, 1e-6);  // FIX v2.1-M1: floor Pv in predict() for full positive-definite covariance protection
    this.Pxv = Math.max(-Math.sqrt(this.Pp * this.Pv), Math.min(this.Pxv, Math.sqrt(this.Pp * this.Pv)));
    // FIX MED-3: Cap covariance growth during sparse-measurement periods
    this.Pp = min(this.Pp, 5000);
  }
  update(meas) {
    // Innovation: difference between measurement and prediction
    const inn = meas - this.pos;
    // Innovation covariance: S = H·P·Hᵀ + R  →  S = Pp + R
    const S = this.Pp + CFG.KALMAN_R;
    // Kalman gain: K = P·Hᵀ·S⁻¹
    const Kp  = this.Pp  / S;
    const Kv  = this.Pxv / S;
    // State update: blend prediction with measurement
    this.pos += Kp * inn;
    this.vel += Kv * inn;
    // Covariance update: P = (I − K·H)·P
    const oldPxv = this.Pxv;
    this.Pp  -= Kp * this.Pp;
    this.Pxv -= Kp * this.Pxv;
    this.Pv  -= Kv * oldPxv;    // FIX v1.4: use pre-mutation Pxv value
    // FIX v2.1-H2: Floor covariance to 1e-6 to enforce positive-definiteness
    this.Pp = max(this.Pp, 1e-6);
    this.Pv = max(this.Pv, 1e-6);
  }
}

// Pair of 1D Kalman filters gives 2D position+velocity tracking
class KalmanTrack {
  constructor(x, y, id = null) { this.kx = new KF1D(x); this.ky = new KF1D(y); this.age = -1; this.id = id; } // FIX LOW-3: start at -1 so first predict() brings age to 0; minKfAge checks are now semantically correct // FIX BUG-H1: store id so cross-cycle engagement dedup works
  predict(dt = 1)  { this.kx.predict(dt); this.ky.predict(dt); this.age++; }
  update(x, y)     { this.kx.update(x); this.ky.update(y); }
  get pos()        { return { x: this.kx.pos, y: this.ky.pos }; }
  get vel()        { return { x: this.kx.vel, y: this.ky.vel }; }
  // IMPROVED: estimated speed magnitude (used by C2 for threat classification)
  get speed()      { return Math.sqrt(this.kx.vel * this.kx.vel + this.ky.vel * this.ky.vel); } // FIX v2.1-L1: use Math.sqrt for safety
}

// ── RADAR STATION ─────────────────────────────────────────────────────────────
class Radar {
  constructor(fracX, id) {
    this.x    = fracX * CFG.SIM_W;  // ground-level placement (horizontal)
    this.y    = CFG.SIM_H;          // always at ground (bottom of screen)
    this.id   = id;
    this.rng  = CFG.RADAR_RANGE_PX;
    this.tracks = new Map();         // threatId → KalmanTrack
    this.sweep  = random(TWO_PI);    // animation phase offset
  }

  // Radar range equation (simplified gameplay version):
  // P_detect = 1 / (1 + (R/R_max)^4) × (σ/σ_nom)
  // The (R/R_max)^4 term comes from the full radar range equation:
  // P_t·G_t·G_r·λ²·σ / ((4π)³·R⁴·kTBF) — fourth-power range law
  detectProb(t) {
    const dx = t.x - this.x, dy = t.y - this.y;
    const R  = sqrt(dx*dx + dy*dy);
    if (R > this.rng) return 0;
    const rangeFactor = 1 / (1 + pow(R / this.rng, 4));
    const rcsFactor   = t.rcs / CFG.RADAR_SIGMA_NOM;
    return rangeFactor * rcsFactor;
  }

  update(threats) {
    this.sweep += 0.02; // sweep animation rate
    for (const t of threats) {
      if (!t.alive) { this.tracks.delete(t.id); continue; }
      const p = this.detectProb(t);
      if (random() < p) {
        // Measurement is noisy: add Gaussian noise (σ ≈ 4px ≈ several hundred metres)
        const mx = t.x + randomGaussian(0, 4);
        const my = t.y + randomGaussian(0, 4);
        if (!this.tracks.has(t.id)) {
          this.tracks.set(t.id, new KalmanTrack(mx, my, t.id)); // first detection // FIX BUG-H1: pass t.id so KalmanTrack.id is set
        } else {
          const kf = this.tracks.get(t.id);
          // FIX MED-1: predict() moved to per-frame loop in draw()
          kf.update(mx, my); // correct with new measurement
        }
      }
    }
  }

  draw() {
    push();
    // v2.0: Rotating sweep line (upper hemisphere only)
    const sweepAngle = -PI + (this.sweep % PI); // sweep through upper hemisphere
    noFill();
    // Sweep line
    stroke(0, 255, 65, 60);
    strokeWeight(1.5);
    const sweepEndX = this.x + cos(sweepAngle) * this.rng;
    const sweepEndY = this.y + sin(sweepAngle) * this.rng;
    line(this.x, this.y, sweepEndX, sweepEndY);
    // Afterglow trail (30 degrees behind sweep)
    for (let a = 1; a <= 6; a++) {
      const trailAngle = sweepAngle - a * 0.087; // ~5 deg steps, 30 deg total
      const trailAlpha = map(a, 1, 6, 35, 5);
      stroke(0, 255, 65, trailAlpha);
      strokeWeight(1);
      const tx = this.x + cos(trailAngle) * this.rng;
      const ty = this.y + sin(trailAngle) * this.rng;
      line(this.x, this.y, tx, ty);
    }
    // Keep the pulsing ring too but fainter
    const rPulse = this.rng * (0.45 + 0.45 * abs(sin(this.sweep)));
    stroke(0, 255, 65, 15);
    strokeWeight(1);
    ellipse(this.x, this.y, rPulse * 2, rPulse * 2);

    // Detection arc boundary (upper hemisphere only)
    stroke(0, 200, 55, 55);
    arc(this.x, this.y, this.rng * 2, this.rng * 2, -PI, 0);

    // Radar site marker: upward-pointing triangle
    fill(0, 255, 65);
    noStroke();
    triangle(this.x - 7, this.y + 2, this.x + 7, this.y + 2, this.x, this.y - 14);

    // Station label
    fill(0, 180, 50);
    noStroke();
    textSize(8);
    textAlign(CENTER);
    text(`RDR-${this.id + 1}`, this.x, this.y + 16);
    pop();
  }
}

// ── EARLY-WARNING RADAR (ELEVATED PLATFORM) ──────────────────────────────────
// IMPROVED v1.2: Ground radars at y=560 can't see HGVs at y=123 (slant range
// ~437px > 290px max range). This elevated EW radar sits at mid-altitude,
// simulating an airborne platform (E-2 Hawkeye) or forward-deployed AN/TPY-2.
// It feeds tracks into the same C2 system so interceptors can launch early.
class EWRadar {
  constructor() {
    this.x    = CFG.EW_RADAR_X_FRAC * CFG.SIM_W;
    this.y    = CFG.SIM_H * (1 - CFG.EW_RADAR_ALT_FRAC); // elevated position
    this.rng  = CFG.EW_RADAR_RANGE_PX;
    this.tracks = new Map();
    this.sweep  = random(TWO_PI);
    this.id     = 'EW';
  }

  detectProb(t) {
    const dx = t.x - this.x, dy = t.y - this.y;
    const R  = sqrt(dx*dx + dy*dy);
    if (R > this.rng) return 0;
    const rangeFactor = 1 / (1 + pow(R / this.rng, 4));
    const rcsFactor   = t.rcs / CFG.EW_RADAR_SIGMA_NOM;
    return rangeFactor * rcsFactor;
  }

  update(threats) {
    this.sweep += 0.015;
    for (const t of threats) {
      if (!t.alive) { this.tracks.delete(t.id); continue; }
      const p = this.detectProb(t);
      if (random() < p) {
        const mx = t.x + randomGaussian(0, 6); // slightly noisier than ground radar
        const my = t.y + randomGaussian(0, 6);
        if (!this.tracks.has(t.id)) {
          this.tracks.set(t.id, new KalmanTrack(mx, my, t.id)); // FIX BUG-H1: pass t.id so KalmanTrack.id is set
        } else {
          const kf = this.tracks.get(t.id);
          // FIX MED-1: predict() moved to per-frame loop in draw()
          kf.update(mx, my);
        }
      }
    }
  }

  draw() {
    push();
    // v2.0: 360-degree rotating sweep (EW is elevated, scans all around)
    // FIX: Clip sweep lines so they don't render below ground (SIM_H)
    const sweepAngle = this.sweep % TWO_PI;
    noFill();
    // Sweep line (orange) — clipped to ground
    stroke(255, 160, 30, 50);
    strokeWeight(1.5);
    let sweepEndX = this.x + cos(sweepAngle) * this.rng;
    let sweepEndY = this.y + sin(sweepAngle) * this.rng;
    if (sweepEndY > CFG.SIM_H) {
      // Clip: find where the line crosses ground level
      // FIX v2.1-M4: guard against division-by-zero when sweep line is horizontal
      const denom = sweepEndY - this.y;
      if (Math.abs(denom) > 0.001) {
        const t = (CFG.SIM_H - this.y) / denom;
        sweepEndX = this.x + t * (sweepEndX - this.x);
      }
      sweepEndY = CFG.SIM_H;
    }
    if (sweepEndY <= CFG.SIM_H) {
      line(this.x, this.y, sweepEndX, sweepEndY);
    }
    // Afterglow trail — also clipped
    for (let a = 1; a <= 6; a++) {
      const trailAngle = sweepAngle - a * 0.087;
      const trailAlpha = map(a, 1, 6, 28, 4);
      stroke(255, 160, 30, trailAlpha);
      strokeWeight(1);
      let tx = this.x + cos(trailAngle) * this.rng;
      let ty = this.y + sin(trailAngle) * this.rng;
      if (ty > CFG.SIM_H) {
        // FIX v2.1-M5: guard against division-by-zero in afterglow trail clipping
        const denom = ty - this.y;
        if (Math.abs(denom) > 0.001) {
          const t = (CFG.SIM_H - this.y) / denom;
          tx = this.x + t * (tx - this.x);
        }
        ty = CFG.SIM_H;
      }
      if (ty <= CFG.SIM_H) {
        line(this.x, this.y, tx, ty);
      }
    }
    // Faint pulsing ring — also clipped to sim area
    const rPulse = this.rng * (0.4 + 0.4 * abs(sin(this.sweep)));
    drawingContext.save();
    drawingContext.beginPath();
    drawingContext.rect(0, 0, CFG.SIM_W, CFG.SIM_H);
    drawingContext.clip();
    stroke(255, 160, 30, 10);
    strokeWeight(1);
    ellipse(this.x, this.y, rPulse * 2, rPulse * 2);
    drawingContext.restore();

    // FIX HIGH-2: EW detection circle clipped to sim area (was bleeding below ground).
    // Draw the arc only where it stays within [0, SIM_H]. Use canvas clip.
    drawingContext.save();
    drawingContext.beginPath();
    drawingContext.rect(0, 0, CFG.SIM_W, CFG.SIM_H);
    drawingContext.clip();
    stroke(255, 140, 20, 40);
    ellipse(this.x, this.y, this.rng * 2, this.rng * 2);
    drawingContext.restore();

    // EW radar marker: diamond shape (distinct from ground radar triangles)
    fill(255, 160, 30);
    noStroke();
    quad(this.x, this.y - 10, this.x + 7, this.y, this.x, this.y + 10, this.x - 7, this.y);

    // Label
    fill(255, 140, 20);
    noStroke();
    textSize(7);
    textAlign(CENTER);
    text('EW-1', this.x, this.y + 18);
    pop();
  }
}

// ── THREAT BASE CLASS ─────────────────────────────────────────────────────────
let _tid = 0; // global threat ID counter

class Threat {
  constructor(type, rcs) {
    this.id    = _tid++;
    this.type  = type;
    this.rcs   = rcs;   // Radar Cross Section (m² equiv.) — lower = stealthier
    this.alive = true;
    this.trail = [];    // position history for motion trail
    this.x = 0; this.y = 0;
    this.vx = 0; this.vy = 0;
    // SLS engagement tracking
    this.engagementHistory = [];  // [{tier, result:'hit'|'miss'}]
    // FIX MEDIUM-3: assessmentTimer removed — was decremented each frame but never read.
    // C2 exclusively uses slsState.waitingUntil for re-engagement gating.
  }
  saveTrail() {
    if (this.trail.length >= 45) this.trail.shift(); // FIX BUG-L1: check before push so steady-state max = 45 as intended
    this.trail.push({ x: this.x, y: this.y });
  }
  drawTrail(r, g, b, maxWidth = 3, minWidth = 0.5) {
    noFill();
    for (let i = 1; i < this.trail.length; i++) {
      const t = i / this.trail.length;
      const alpha = t * 170;
      const w = lerp(minWidth, maxWidth, t);
      stroke(r, g, b, alpha);
      strokeWeight(w);
      line(this.trail[i-1].x, this.trail[i-1].y, this.trail[i].x, this.trail[i].y);
    }
    // FIX: Draw final segment from last trail point to current entity position.
    // Without this, there's an off-by-one gap between trail end and entity body.
    if (this.trail.length > 0) {
      const last = this.trail[this.trail.length - 1];
      stroke(r, g, b, 170);
      strokeWeight(maxWidth);
      line(last.x, last.y, this.x, this.y);
    }
  }
  // Label each threat near its icon
  drawLabel(label, r, g, b) {
    fill(r, g, b, 190);
    noStroke();
    textSize(8);
    textAlign(LEFT);
    text(label, this.x + 9, this.y - 3);
  }
}

// ── BALLISTIC MISSILE ─────────────────────────────────────────────────────────
// Trajectory follows projectile kinematics:
// x(t) = x₀ + vx·t
// y(t) = y₀ + vy·t + ½·g·t²   (in px-space, g = GRAVITY_PX, y increases downward)
// Enters from left on ascending leg; gravity curves it down toward target.
class BallisticMissile extends Threat {
  constructor(xOffset = 0) {
    super('BALLISTIC', 0.9);   // large RCS — easy to detect but hard to intercept at speed
    this.x  = -10 - xOffset;
    this.y  = CFG.SIM_H;      // launch from ground (left edge)
    // vy needed to reach peak altitude ≈ 40% of SIM_H from ground.
    // Kinematics: vy₀ = -sqrt(2·g·h_peak)  (negative = upward on canvas)
    const peakPx = CFG.SIM_H * 0.40;  // FIX v1.4: flatter trajectory reaches further downrange (was 0.55)
    this.vy = -sqrt(2 * CFG.GRAVITY_PX * peakPx);
    this.vx = CFG.SPD_BALLISTIC * 1.2;  // FIX v1.4: slightly faster horizontal to reach defended zone
    this.spawnAge = 0; // v2.0: frame counter for boost exhaust flare
  }
  update(dt = 1) { // FIX HIGH-2: accept dt for frame-rate-independent physics
    this.saveTrail();
    this.spawnAge++;
    this.vy += CFG.GRAVITY_PX * dt; // gravitational acceleration scaled by dt
    this.x  += this.vx * dt;
    this.y  += this.vy * dt;
    // FIX MEDIUM-3: Check battery leakage BEFORE ground-impact to prevent scoring race condition
    // If already past battery x-position, let checkCollisions() handle leakage scoring
    if (this.x >= CFG.SIM_W * CFG.BATT_X_FRAC) return; // defer to checkCollisions()
    // FIX MED-1: Ballistic missile ground impact — spawn explosion + log instead of silent death
    if (this.y > CFG.SIM_H + 5) {
      boom(this.x, CFG.SIM_H, 180, 100, 40, 12, this.type); // ground impact dust
      this.alive = false;
      addLog(`BSTC GROUND IMPACT x=${floor(this.x)}`);
      return;
    }
    if (this.x > CFG.SIM_W + 5) this.alive = false;
  }
  draw() {
    this.drawTrail(255, 80, 60);
    push();
    translate(this.x, this.y);
    rotate(atan2(this.vy, this.vx)); // point in direction of travel
    fill(255, 80, 60);
    noStroke();
    triangle(-8, -3, -8, 3, 7, 0);  // elongated body
    pop();
    // v2.0: Boost phase exhaust flare (fades over first 25 frames)
    if (this.spawnAge < 25) {
      const flareAlpha = map(this.spawnAge, 0, 25, 220, 0);
      const flareSize = map(this.spawnAge, 0, 25, 12, 3);
      push();
      translate(this.x, this.y);
      rotate(atan2(this.vy, this.vx));
      noStroke();
      fill(255, 200, 50, flareAlpha);
      ellipse(-10, 0, flareSize, flareSize * 0.6);
      fill(255, 255, 220, flareAlpha * 0.8);
      ellipse(-9, 0, flareSize * 0.4, flareSize * 0.3);
      pop();
    }
    this.drawLabel('BSTC', 255, 110, 80);
  }
}

// ── CRUISE MISSILE ────────────────────────────────────────────────────────────
// Constant-altitude subsonic flight with gentle terrain-following oscillation.
// Low RCS (σ=0.4) → harder to detect than ballistic.
class CruiseMissile extends Threat {
  constructor(xOff = 0) {
    super('CRUISE', 0.4);
    this.x  = -10 - xOff;
    this.y  = CFG.SIM_H - random(55, 150); // low-altitude ingress
    this.vx = CFG.SPD_CRUISE;
    this.vy = 0;
    this.phase = random(TWO_PI); // sinusoidal altitude variation phase
  }
  update(dt = 1) { // FIX HIGH-2: accept dt for frame-rate-independent physics
    this.saveTrail();
    this.phase += 0.035 * dt;
    this.y  += sin(this.phase) * 0.25 * dt; // mild terrain-following undulation, scaled by dt
    this.x  += this.vx * dt;
    if (this.x > CFG.SIM_W + 5) this.alive = false;
  }
  draw() {
    // v2.0: Faint terrain shadow line beneath
    stroke(255, 160, 40, 15);
    strokeWeight(0.5);
    line(this.x - 20, CFG.SIM_H, this.x + 5, CFG.SIM_H);
    this.drawTrail(255, 160, 40);
    push();
    translate(this.x, this.y);
    fill(255, 160, 40);
    noStroke();
    ellipse(0, 0, 16, 5);  // flat fuselage
    rect(-5, -6, 12, 2);   // wing
    pop();
    this.drawLabel('CRZ', 255, 190, 80);
  }
}

// ── HYPERSONIC GLIDE VEHICLE ──────────────────────────────────────────────────
// IMPROVED v1.1: RCS raised from 0.08 to 0.15 — still very stealthy
// (ballistic=0.9, cruise=0.4, HGV=0.15, drone=0.05) but now detectable
// at medium range so the kill chain has a fighting chance.
//
// Real HGVs (DF-17, Avangard): Mach 5–10, pull-up/skip-glide maneuver.
// Speed makes it extremely difficult to intercept with conventional SAMs,
// but THAAD-class fast interceptors can now engage them.
class HypersonicGlide extends Threat {
  constructor() {
    super('HYPERSONIC', 0.15); // IMPROVED: was 0.08, now 0.15 — stealthy but detectable
    this.x  = -10;
    // IMPROVED v1.2: Lower entry altitude so HGV enters radar envelope sooner.
    // Was 0.22 (123px from top = 437px above ground radars = ABOVE radar ceiling).
    // Now 0.38 (~213px from top = 347px above ground). Combined with EW radar
    // and steeper glide, the kill chain can actually start in time.
    this.y  = CFG.SIM_H * 0.38;
    this.vx = CFG.SPD_HYPERSONIC;
    // IMPROVED v1.2: Steeper glide slope (was 0.7, now 1.2) — descends into
    // radar coverage faster while still being a challenging high-speed target.
    this.vy = 1.2;
    this.wobPhase = random(TWO_PI);
    // IMPROVED v1.2: Stronger evasive wobble (was 0.04-0.14, now 0.3-0.8)
    // Makes the HGV harder to intercept once detected — compensates for
    // being more detectable. Real HGVs maneuver aggressively in terminal phase.
    this.wobAmp   = random(0.3, 0.8);
  }
  update(dt = 1) { // FIX HIGH-2: accept dt for frame-rate-independent physics
    this.saveTrail();
    this.wobPhase += 0.09 * dt;
    this.vy += 0.008 * dt; // IMPROVED: stronger gravity pull accelerates descent, scaled by dt
    // Lateral (vertical on screen) wobble simulates skip-glide maneuver
    this.y  += (this.vy + sin(this.wobPhase) * this.wobAmp) * dt;
    this.x  += this.vx * dt;
    if (this.x > CFG.SIM_W + 5 || this.y > CFG.SIM_H + 5) this.alive = false;
  }
  draw() {
    this.drawTrail(180, 80, 255, 4.5, 1.0);
    // v2.0: Reentry plasma glow — scales with speed
    const spd = sqrt(this.vx * this.vx + this.vy * this.vy);
    const glowSize = map(spd, 3, 10, 8, 22);
    const shimmer = sin(frameCount * 0.3 + this.wobPhase) * 2;
    push();
    noStroke();
    fill(255, 140, 40, 35);
    ellipse(this.x + shimmer * 0.5, this.y + shimmer * 0.3, glowSize * 2, glowSize * 1.4);
    fill(255, 220, 180, 55);
    ellipse(this.x + shimmer * 0.3, this.y + shimmer * 0.2, glowSize, glowSize * 0.7);
    pop();
    push();
    translate(this.x, this.y);
    rotate(atan2(this.vy, this.vx));
    fill(180, 80, 255);
    noStroke();
    // Wedge / lifting-body cross-section
    quad(-8, 5, 9, 0, -8, -2, -11, 3);
    pop();
    this.drawLabel('HGV', 210, 120, 255);
  }
}

// ── DRONE (single unit in a swarm) ───────────────────────────────────────────
// Boids algorithm implements three flocking forces:
//   Separation : steer away from too-close neighbors (avoid collisions)
//   Alignment  : match average velocity of nearby drones (fly together)
//   Cohesion   : steer toward centroid of nearby drones (stay grouped)
class Drone extends Threat {
  constructor(x, y) {
    super('DRONE', 0.05);   // tiny RCS — nearly invisible to radar!
    this.x  = x; this.y = y;
    this.vx = CFG.SPD_DRONE + random(-0.3, 0.3);
    this.vy = random(-0.25, 0.25);
  }
  applyBoids(drones, dt = 1) { // FIX MEDIUM-1: accept dt for frame-rate-independent boid forces
    let sx=0, sy=0, sc=0;    // separation
    let ax=0, ay=0, ac=0;    // alignment
    let cx=0, cy=0, cc=0;    // cohesion
    for (const o of drones) {
      if (o === this || !o.alive) continue;
      const dx = this.x-o.x, dy = this.y-o.y;
      const d  = sqrt(dx*dx+dy*dy);
      if (d < CFG.BOID_SEP && d > 0.1) { sx += dx/d; sy += dy/d; sc++; } // FIX v2.1-H4: guard d > 0.1 to prevent near-zero division
      if (d < CFG.BOID_ALIGN) { ax += o.vx; ay += o.vy; ac++; }
      if (d < CFG.BOID_COH)   { cx += o.x;  cy += o.y;  cc++; }
    }
    if (sc > 0) { this.vx += (sx/sc)*0.09*dt; this.vy += (sy/sc)*0.09*dt; } // FIX MEDIUM-1: scale by dt
    if (ac > 0) { this.vx += (ax/ac - this.vx)*0.04*dt; this.vy += (ay/ac - this.vy)*0.04*dt; } // FIX MEDIUM-1: scale by dt
    if (cc > 0) { this.vx += ((cx/cc)-this.x)*0.002*dt; this.vy += ((cy/cc)-this.y)*0.002*dt; } // FIX MEDIUM-1: scale by dt
    // Speed clamp: drones are slow
    const spd = sqrt(this.vx*this.vx + this.vy*this.vy);
    if (spd > CFG.SPD_DRONE * 1.6) {
      this.vx = (this.vx/spd) * CFG.SPD_DRONE * 1.6;
      this.vy = (this.vy/spd) * CFG.SPD_DRONE * 1.6;
    }
  }
  // v2.0: Shorter trail for small drones
  saveTrail() {
    if (this.trail.length >= 18) this.trail.shift(); // FIX BUG-L1: check before push so steady-state max = 18 as intended
    this.trail.push({ x: this.x, y: this.y });
  }
  update(dt = 1, peers) { // FIX HIGH-2: accept dt for frame-rate-independent physics
    this.saveTrail();
    this.applyBoids(peers, dt); // FIX MEDIUM-2: pass dt to boids; floor applied after
    this.vx = max(this.vx, 0.55); // FIX MEDIUM-2: enforce minimum advance speed AFTER boid corrections
    this.x += this.vx * dt; this.y += this.vy * dt;
    if (this.x > CFG.SIM_W+5 || this.y<-10 || this.y>CFG.SIM_H+10) this.alive=false;
  }
  draw() {
    this.drawTrail(60, 255, 180, 1.5, 0.3);
    push();
    fill(60, 255, 180);
    noStroke();
    ellipse(this.x, this.y, 5, 5);
    pop();
  }
}

// ── INTERCEPTOR — PROPORTIONAL NAVIGATION GUIDANCE ────────────────────────────
// PN is the standard guidance law used in virtually all modern SAMs (Patriot, THAAD, etc.)
//
// Guidance command: a_m = N · V_c · (dθ/dt)
//   a_m   = acceleration commanded perpendicular to line-of-sight
//   N     = navigation constant (CFG.PN_N = 4, tunable)
//   V_c   = closing velocity (rate at which range decreases)
//   dθ/dt = LOS (line-of-sight) angular rate
//
// Physical intuition: if LOS isn't rotating (dθ/dt = 0), both objects
// are on a collision course — missile already aimed correctly. If LOS
// is rotating, steer to cancel that rotation.
//
// IMPROVED v1.1: Now supports two modes — standard (PAC-3 class) and
// fast (THAAD class) for hypersonic threat engagement.
class Interceptor {
  constructor(x, y, track, tierKey) {
    this.x     = x; this.y = y;
    this.track = track;
    this.trackId = (track && track.id !== undefined) ? track.id : null;
    this.tierKey = tierKey;
    this.tier = CFG.INT_TIERS[tierKey] || CFG.INT_TIERS.MIDDLE;
    this.speed = this.tier.speed;
    this.maxAccel = this.tier.accelMax;
    this.navConst = this.tier.navConst;
    this.killRadius = this.tier.killRadius;
    this.sspk = this.tier.sspk;
    this.color = this.tier.color;
    this.trailColor = this.tier.trailColor;

    // FIX HIGH-1: Guard against null/undefined track to prevent TypeError on track.pos
    if (!track) { this.alive = false; return; }
    const tp = track.pos;
    const tv = track.vel;
    const dx = tp.x - x;
    const dy = tp.y - y;
    const dist = Math.sqrt(dx * dx + dy * dy);
    const tEst = dist / this.speed;
    const px = tp.x + tv.x * tEst * CFG.LEAD_DAMPING; // FIX v2.1-L2: configurable lead damping
    const py = tp.y + tv.y * tEst * CFG.LEAD_DAMPING;
    const aimDx = px - x;
    const aimDy = py - y;
    const aimDist = Math.sqrt(aimDx * aimDx + aimDy * aimDy);
    let aim = Math.atan2(aimDy, aimDx);
    if (aim > -Math.PI * 0.15 || aim < -Math.PI * 0.98) {
      aim = Math.atan2(tp.y - y, tp.x - x);
      if (aim > -Math.PI * 0.15 || aim < -Math.PI * 0.98) {
        aim = -Math.PI * 0.75;
      }
    }
    if (aimDist > 0.1) {
      this.vx = Math.cos(aim) * this.speed;
      this.vy = Math.sin(aim) * this.speed;
    } else {
      this.vx = 0;
      this.vy = -this.speed;
    }
    this.alive = true;
    this.prevX = x;
    this.prevY = y;
    this.prevLOS = null;
    this.trail = [];
    this.age   = 0;
  }
  update(dt = 1) { // FIX HIGH-2: accept dt for frame-rate-independent PN guidance
    this.age++;
    if (this.age > CFG.INT_MAX_AGE) { this.alive = false; return; }

    // FIX H5: Check if assigned target track is still valid after ghost pruning.
    // If the track was pruned (no radar carries it), the KalmanTrack object is
    // orphaned and will never receive predict/update calls — its coordinates freeze.
    // Trigger SLS re-engagement so C2 can assign a new interceptor to the threat.
    if (this.trackId !== null) {
      let trackStillValid = false;
      for (const r of [...radars, ewRadar]) {
        if (r.tracks.has(this.trackId)) { trackStillValid = true; break; }
      }
      if (!trackStillValid) {
        this.alive = false;
        const assessment = ensureTrackAssessment(this.trackId);
        assessment.waitingUntil = frameCount + CFG.SLS_ASSESS_DELAY;
        addLog(`${this.tierKey} LOST TRACK [TRK-${this.trackId}] → SLS LOOK`);
        return;
      }
    }

    if (this.trail.length >= 28) this.trail.shift(); // FIX BUG-L1: check before push so steady-state max = 28 as intended
    this.trail.push({ x: this.x, y: this.y });

    const tp = this.track.pos;
    const tv = this.track.vel;
    const rx = tp.x - this.x, ry = tp.y - this.y;
    const rMag = sqrt(rx*rx + ry*ry);
    const los = atan2(ry, rx);

    let losRate = 0;
    if (this.prevLOS !== null) {
      let dTheta = los - this.prevLOS;
      if (dTheta >  PI) dTheta -= TWO_PI;
      if (dTheta < -PI) dTheta += TWO_PI;
      losRate = dTheta / dt; // FIX H1: divide by dt for frame-rate-independent LOS rate
    }
    this.prevLOS = los;

    if (rMag < 0.5) {
      // FIX H3: update prevX/prevY before early return so swept-volume
      // collision check doesn't use stale positions from 2+ frames ago
      this.prevX = this.x;
      this.prevY = this.y;
      return;
    }

    const relVx = tv.x - this.vx, relVy = tv.y - this.vy;
    const losUx = rx / rMag,       losUy = ry / rMag;
    const Vc = -(relVx * losUx + relVy * losUy);
    // FIX H4: Vc<0 (overshoot) triggers SLS re-engagement instead of silent self-destruct
    if (Vc < 0) {
      this.alive = false;
      // Trigger SLS step-down so C2 can re-engage this threat at the next tier
      if (this.trackId !== null) {
        const assessment = ensureTrackAssessment(this.trackId);
        assessment.waitingUntil = frameCount + CFG.SLS_ASSESS_DELAY;
        addLog(`${this.tierKey} OVERSHOOT [Vc<0] → SLS LOOK`);
      }
      return;
    }
    const clampedVc = max(Vc, 0.5);
    const aMag  = this.navConst * clampedVc * losRate;
    const aCmd  = constrain(aMag, -this.maxAccel, this.maxAccel);

    this.vx += aCmd * (-losUy) * dt; // FIX H2: scale acceleration impulse by dt
    this.vy += aCmd * ( losUx) * dt; // FIX H2: frame-rate-independent velocity change

    const spd = sqrt(this.vx*this.vx + this.vy*this.vy);
    if (spd > 1.0) { // FIX v2.1-M2: increase normalization guard from 0.01 to 1.0 for stability
      this.vx = (this.vx/spd) * this.speed;
      this.vy = (this.vy/spd) * this.speed;
    }
    if (!isFinite(this.vx) || !isFinite(this.vy)) {
      this.alive = false; return;
    }
    this.prevX = this.x;
    this.prevY = this.y;
    this.x += this.vx * dt; this.y += this.vy * dt; // FIX HIGH-2: scale position by dt
    if (!isFinite(this.x) || !isFinite(this.y)) {
      this.alive = false; return;
    }
    if (this.x<-30||this.x>CFG.SIM_W+30||this.y<-60||this.y>CFG.SIM_H+20) this.alive=false;
  }
  draw() {
    noFill();
    const fuelLow = this.age > CFG.INT_MAX_AGE * 0.7;
    for (let i = 1; i < this.trail.length; i++) {
      const t = i / this.trail.length;
      const alpha = t * 225;
      const w = lerp(0.4, this.tierKey === 'UPPER' ? 2.7 : this.tierKey === 'MIDDLE' ? 2.2 : 1.8, t);
      const flickerAlpha = fuelLow ? alpha * random(0.3, 1.0) : alpha;
      stroke(this.trailColor[0], this.trailColor[1], this.trailColor[2], min(255, flickerAlpha));
      strokeWeight(w);
      line(this.trail[i-1].x, this.trail[i-1].y, this.trail[i].x, this.trail[i].y);
    }
    if (this.tierKey === 'UPPER' && this.trail.length > 2) {
      for (let i = max(1, this.trail.length - 4); i < this.trail.length; i++) {
        stroke(255, 255, 255, 80);
        strokeWeight(0.8);
        line(this.trail[i-1].x, this.trail[i-1].y, this.trail[i].x, this.trail[i].y);
      }
    }
    push();
    translate(this.x, this.y);
    rotate(atan2(this.vy, this.vx));
    fill(this.color[0], this.color[1], this.color[2]);
    noStroke();
    if (this.tierKey === 'UPPER') {
      triangle(-6, -3, -6, 3, 10, 0);
      fill(255, 255, 255, 120);
      ellipse(-7, 0, 4, 3);
    } else if (this.tierKey === 'MIDDLE') {
      triangle(-5, -2.5, -5, 2.5, 8, 0);
    } else {
      triangle(-4.5, -2.2, -4.5, 2.2, 7, 0);
      fill(255, 255, 255, 110);
      ellipse(-5.2, 0, 2.5, 2.2);
    }
    pop();
  }
}

// ── PARTICLE SYSTEM (v2.0 — Multi-layer explosions) ──────────────────────────
class Particle {
  constructor(x, y, r, g, b, opts = {}) {
    this.x = x; this.y = y;
    const spread = opts.spread || 4;
    this.vx = random(-spread, spread);
    this.vy = random(-spread, spread);
    if (opts.gravity) this.gravity = opts.gravity; else this.gravity = 0;
    this.life = 1.0;
    this.decay = opts.decay || random(0.018, 0.055);
    this.r = r; this.g = g; this.b = b;
    this.sz = opts.size || random(2, 7);
  }
  update() {
    this.x += this.vx; this.y += this.vy;
    this.vy += this.gravity;
    this.vx *= 0.91; this.vy *= 0.91;
    this.life -= this.decay;
  }
  draw() {
    noStroke();
    fill(this.r, this.g, this.b, this.life * 255);
    ellipse(this.x, this.y, this.sz * this.life, this.sz * this.life);
  }
  get dead() { return this.life <= 0; }
}

// Shockwave ring (expanding fading circle)
class ShockwaveRing {
  constructor(x, y, r, g, b) {
    this.x = x; this.y = y;
    this.r = r; this.g = g; this.b = b;
    this.radius = 2; this.maxRadius = random(28, 45);
    this.life = 1.0;
  }
  update() {
    this.radius += (this.maxRadius - this.radius) * 0.12;
    this.life -= 0.035;
  }
  draw() {
    noFill();
    stroke(this.r, this.g, this.b, this.life * 120);
    strokeWeight(max(0.5, this.life * 2.5));
    ellipse(this.x, this.y, this.radius * 2, this.radius * 2);
  }
  get dead() { return this.life <= 0; }
}

// v2.0: Multi-layer explosion with threat-type color palette
const THREAT_COLORS = {
  BALLISTIC:  { core: [255,255,255], mid: [255,80,60],  spark: [255,160,80]  },
  CRUISE:     { core: [255,255,220], mid: [255,200,50], spark: [255,160,40]  },
  HYPERSONIC: { core: [255,220,255], mid: [180,80,255], spark: [140,60,200]  },
  DRONE:      { core: [220,255,240], mid: [60,255,180], spark: [40,200,140]  },
};

function boom(x, y, r = 255, g = 160, b = 40, n = 28, threatType = null) {
  // FIX v2.1-M3: Cap total particles to prevent unbounded growth during intense combat
  if (particles.length > 800) return;
  const colors = threatType && THREAT_COLORS[threatType] ? THREAT_COLORS[threatType] : null;

  // Inner core flash (bright white, fast fade)
  const coreN = floor(n * 0.25);
  for (let i = 0; i < coreN; i++) {
    const cr = colors ? colors.core[0] : 255;
    const cg = colors ? colors.core[1] : 255;
    const cb = colors ? colors.core[2] : 255;
    particles.push(new Particle(x, y, cr, cg, cb, { spread: 2, decay: random(0.06, 0.12), size: random(3, 8) }));
  }

  // Mid ring (threat-colored, medium fade)
  const midN = floor(n * 0.45);
  for (let i = 0; i < midN; i++) {
    const mr = colors ? colors.mid[0] : r;
    const mg = colors ? colors.mid[1] : g;
    const mb = colors ? colors.mid[2] : b;
    particles.push(new Particle(x, y, mr, mg, mb, { spread: 4, decay: random(0.02, 0.05), size: random(2, 6) }));
  }

  // Outer sparks (dimmer, slower, with gravity drift)
  const sparkN = n - coreN - midN;
  for (let i = 0; i < sparkN; i++) {
    const sr = colors ? colors.spark[0] : r * 0.7;
    const sg = colors ? colors.spark[1] : g * 0.7;
    const sb = colors ? colors.spark[2] : b * 0.7;
    particles.push(new Particle(x, y, sr, sg, sb, { spread: 5, decay: random(0.012, 0.035), size: random(1.5, 4), gravity: 0.06 }));
  }

  // Shockwave ring
  const ringR = colors ? colors.mid[0] : r;
  const ringG = colors ? colors.mid[1] : g;
  const ringB = colors ? colors.mid[2] : b;
  particles.push(new ShockwaveRing(x, y, ringR, ringG, ringB));
}

// ── GAME STATE ────────────────────────────────────────────────────────────────
let threats, interceptors, particles, radars, ewRadar;
let lastFrameTime = 0; // FIX v2.1-L5: delta-time tracking for frame-rate-independent physics
let score, lastWave, gameOver, log;
let killFeed = [];
let screenShake = 0;
let lastC2Frame = 0;
let slsState = new Map();

// ── C2 — COMMAND & CONTROL (PRIORITY-BASED INTERCEPTOR ASSIGNMENT) ───────────
// IMPROVED v1.1: Complete rewrite for HGV balance.
// Strategy:
//   1. Merge all radar tracks into a single threat picture
//   2. Classify each track by estimated speed (hypersonic vs standard)
//   3. Prioritize fast movers — engage them FIRST and EARLIER (lower range threshold)
//   4. Launch fast interceptors (THAAD-class) for hypersonic tracks
//   5. Launch standard interceptors (PAC-3 class) for everything else
//   6. Adaptive cooldown: check for fast movers more frequently
function getThreatAltitudeBand(y) {
  const frac = y / CFG.SIM_H;
  if (frac <= CFG.INT_TIERS.UPPER.engageYMaxFrac) return 'UPPER';
  if (frac <= CFG.INT_TIERS.MIDDLE.engageYMaxFrac) return 'MIDDLE';
  return 'LOWER';
}

// Check if a threat type is preferred by a tier (SLS tier-matching)
function isThreatPreferred(tierKey, threatType) {
  const tier = CFG.INT_TIERS[tierKey];
  if (!tier || !tier.preferredThreats) return false;
  return tier.preferredThreats.includes(threatType.toLowerCase());
}

function getTierColor(tierKey) {
  const tier = CFG.INT_TIERS[tierKey] || CFG.INT_TIERS.MIDDLE;
  return tier.color;
}

function ensureTrackAssessment(id) {
  if (!slsState.has(id)) {
    slsState.set(id, { currentTierIndex: null, waitingUntil: 0, attempts: 0, reengageCount: 0 });
  }
  return slsState.get(id);
}

function launchTierInterceptor(kf, threat, tierKey, isReengage = false) {
  const tier = CFG.INT_TIERS[tierKey];
  if (!tier || score.magazines[tierKey] <= 0) return false;
  const lx = CFG.BATT_X_FRAC * CFG.SIM_W;
  interceptors.push(new Interceptor(lx, CFG.SIM_H - 8, kf, tierKey));
  score.shots++;
  score.magazines[tierKey]--;
  score.tierStats[tierKey].fire++;
  const assessment = ensureTrackAssessment(threat.id);
  assessment.waitingUntil = frameCount + CFG.SLS_ASSESS_DELAY;
  const tierIndex = CFG.TIER_ORDER.indexOf(tierKey);
  assessment.currentTierIndex = tierIndex;
  assessment.attempts++;
  if (isReengage) {
    assessment.reengageCount++;
    score.slsReengage++;
    addLog(`SLS ▶ ${tierKey} RE-ENGAGE [${threat.type}]`);
  } else {
    addLog(`C2 ▶ ${tierKey} FIRE [${threat.type}]`);
  }
  return true;
}

function runC2() {
  const allTracks = new Map();
  for (const r of radars) {
    for (const [id, kf] of r.tracks) {
      if (!allTracks.has(id) || kf.age > allTracks.get(id).age) allTracks.set(id, kf);
    }
  }
  for (const [id, kf] of ewRadar.tracks) {
    if (!allTracks.has(id) || kf.age > allTracks.get(id).age) allTracks.set(id, kf);
  }

  const engagedIds = new Set(interceptors.filter(i => i.alive && i.trackId !== null).map(i => i.trackId));
  const liveThreatIds = new Set(threats.filter(t => t.alive).map(t => t.id));
  for (const id of [...slsState.keys()]) {
    if (!liveThreatIds.has(id)) slsState.delete(id);
  }

  // FIX v2.1-M6: Build threat Map for O(1) lookup instead of O(n) threats.find()
  const threatMap = new Map(threats.filter(t => t.alive).map(t => [t.id, t]));
  const candidates = [];
  for (const [id, kf] of allTracks) {
    const threat = threatMap.get(id);
    if (!threat) continue;
    if (engagedIds.has(id)) continue;

    const estSpeed = kf.speed;
    const isHypersonic = estSpeed > CFG.HYPERSONIC_SPD_THRESH;
    const engageThresh = isHypersonic ? CFG.C2_EARLY_ENGAGE_FRAC : CFG.C2_ENGAGE_RANGE_FRAC;
    if (kf.pos.x < CFG.SIM_W * engageThresh) continue;
    if (kf.pos.x > CFG.BATT_X_FRAC * CFG.SIM_W) continue;
    const isDroneSlow = estSpeed < 2.0;
    const minKfAge = isHypersonic ? 4 : (isDroneSlow ? 1 : 2);
    if (kf.age < minKfAge) continue;

    const altitudeTier = getThreatAltitudeBand(kf.pos.y);
    const assessment = ensureTrackAssessment(id);
    let desiredIndex = CFG.TIER_ORDER.indexOf(altitudeTier);
    if (desiredIndex < 0) desiredIndex = 1;

    // SLS re-engage: if previous tier missed and assessment timer expired, step down
    if (assessment.currentTierIndex !== null) {
      if (frameCount < assessment.waitingUntil) continue;
      desiredIndex = min(CFG.TIER_ORDER.length - 1, assessment.currentTierIndex + 1);
    }

    // Find best tier: prefer one whose preferredThreats includes this threat type
    let tierKey = CFG.TIER_ORDER[desiredIndex];
    // If current tier doesn't prefer this threat type, search for a better match
    if (!isThreatPreferred(tierKey, threat.type)) {
      for (let ti = desiredIndex; ti < CFG.TIER_ORDER.length; ti++) {
        const candidate = CFG.TIER_ORDER[ti];
        if (isThreatPreferred(candidate, threat.type) && score.magazines[candidate] > 0) {
          tierKey = candidate;
          break;
        }
      }
    }
    if (score.magazines[tierKey] <= 0) continue;
    candidates.push({ id, kf, threat, estSpeed, isHypersonic, tierKey, isReengage: assessment.currentTierIndex !== null });
  }

  candidates.sort((a, b) => {
    if (a.isReengage && !b.isReengage) return -1;
    if (!a.isReengage && b.isReengage) return 1;
    if (a.isHypersonic && !b.isHypersonic) return -1;
    if (!a.isHypersonic && b.isHypersonic) return 1;
    return b.kf.pos.x - a.kf.pos.x;
  });

  for (const c of candidates) {
    if (engagedIds.has(c.id)) continue;
    if (launchTierInterceptor(c.kf, c.threat, c.tierKey, c.isReengage)) engagedIds.add(c.id);
  }
}

// ── WAVE GENERATOR ────────────────────────────────────────────────────────────
function spawnWave(type) {
  score.wave++;
  const types = ['ballistic','cruise','hypersonic','drone'];
  const t = type || types[floor(random(types.length))];
  addLog(`══ WAVE ${score.wave}: ${t.toUpperCase()} INBOUND ══`);

  if (t === 'ballistic') {
    const n = floor(random(1,4));
    for (let i=0; i<n; i++) threats.push(new BallisticMissile(i * 30));
  } else if (t === 'cruise') {
    const n = floor(random(1,4));
    for (let i=0; i<n; i++) {
      const c = new CruiseMissile(i * 50);
      c.y = CFG.SIM_H - random(50, 160);
      threats.push(c);
    }
  } else if (t === 'hypersonic') {
    threats.push(new HypersonicGlide());
  } else if (t === 'drone') {
    const n = floor(random(5, 11));
    const cy = random(CFG.SIM_H * 0.5, CFG.SIM_H * 0.85);
    for (let i=0; i<n; i++) threats.push(new Drone(random(-60,-5), cy+random(-25,25)));
  }
}

function addLog(msg) {
  log.unshift({ text: msg, age: 0 });
  if (log.length > 7) log.pop();
}

// v2.0: Kill feed for HUD display
function addKillFeed(radarId, trackId, intType, result) {
  const entry = `${radarId}->TRK-${trackId}->${intType}->${result}`;
  killFeed.unshift({ text: entry, age: 0, tier: intType, result });
  if (killFeed.length > 6) killFeed.pop();
}

// ── COLLISION CHECK ───────────────────────────────────────────────────────────
function checkCollisions() {
  for (const inter of interceptors) {
    if (!inter.alive) continue;
    for (const t of threats) {
      if (!t.alive) continue;
      const cx = inter.x - t.x, cy = inter.y - t.y;
      let minDist = sqrt(cx*cx + cy*cy);
      if (inter.prevX !== undefined && inter.age >= 2) {
        const prev = { x: inter.prevX, y: inter.prevY };
        const segDx = inter.x - prev.x, segDy = inter.y - prev.y;
        const segLen2 = segDx * segDx + segDy * segDy;
        if (segLen2 > 0.01) {
          const tProj = max(0, min(1, ((t.x - prev.x) * segDx + (t.y - prev.y) * segDy) / segLen2));
          const closestX = prev.x + tProj * segDx;
          const closestY = prev.y + tProj * segDy;
          const cdx = closestX - t.x, cdy = closestY - t.y;
          const segDist = sqrt(cdx*cdx + cdy*cdy);
          minDist = min(minDist, segDist);
        }
      }
      if (minDist < inter.killRadius) {
        const c = inter.color;
        const killed = random() < inter.sspk;
        inter.alive = false;
        const assessment = ensureTrackAssessment(t.id);
        assessment.waitingUntil = frameCount + CFG.SLS_ASSESS_DELAY;
        if (killed) {
          boom(t.x, t.y, c[0], c[1], c[2], 32, t.type);
          t.alive = false;
          score.kills++;
          score.tierStats[inter.tierKey].hit++;
          if (t.engagementHistory.length >= 5) t.engagementHistory.shift(); // FIX MEDIUM-2: cap to last 5 to prevent unbounded growth
          t.engagementHistory.push({ tier: inter.tierKey, result: 'hit' });
          addLog(`${inter.tierKey} HIT [${t.type}]`);
          addKillFeed('C2', t.id, inter.tierKey, `HIT ${nf(inter.sspk, 1, 2)}`);
          slsState.delete(t.id);
        } else {
          boom(t.x, t.y, c[0], c[1], c[2], 12, null);
          score.tierStats[inter.tierKey].miss++;
          if (t.engagementHistory.length >= 5) t.engagementHistory.shift(); // FIX MEDIUM-2: cap to last 5 to prevent unbounded growth
          t.engagementHistory.push({ tier: inter.tierKey, result: 'miss' });
          // FIX MEDIUM-3: removed t.assessmentTimer set — field eliminated, slsState.waitingUntil handles re-engagement delay
          addLog(`${inter.tierKey} MISS [${t.type}] LOOK`);
          addKillFeed('C2', t.id, inter.tierKey, `MISS ${nf(inter.sspk, 1, 2)}`);
        }
        break;
      }
    }
  }
  for (const t of threats) {
    if (!t.alive) continue;
    if (t.x >= CFG.SIM_W * CFG.BATT_X_FRAC) { // reached battery position = leakage
      boom(t.x, t.y, 255, 40, 40, 40, t.type); // red impact explosion
      boom(t.x, t.y-10, 255, 100, 0, 20, t.type);
      screenShake = 8;
      t.alive = false;
      score.leak++;
      addLog(`⚠  LEAKAGE  ${t.type}  IMPACT`);
      if (score.leak >= CFG.MAX_LEAKAGE) gameOver = true;
    }
  }
}

// v2.0: Faint connector lines between nearby drones in a swarm
function drawDroneFormationLines(drones) {
  const aliveDrones = drones.filter(d => d.alive);
  for (let i = 0; i < aliveDrones.length; i++) {
    for (let j = i + 1; j < aliveDrones.length; j++) {
      const a = aliveDrones[i], b = aliveDrones[j];
      const dx = a.x - b.x, dy = a.y - b.y;
      const d = sqrt(dx * dx + dy * dy);
      if (d < CFG.BOID_COH && d > 0) {
        const alpha = map(d, 0, CFG.BOID_COH, 40, 0);
        stroke(60, 255, 180, alpha);
        strokeWeight(0.5);
        line(a.x, a.y, b.x, b.y);
      }
    }
  }
}

// v2.0: Dashed lines from interceptors to assigned targets
function drawEngagementLines() {
  for (const inter of interceptors) {
    if (!inter.alive || !inter.track) continue;
    const tp = inter.track.pos;
    const dx = tp.x - inter.x;
    const dy = tp.y - inter.y;
    const dist = sqrt(dx * dx + dy * dy);
    const segments = floor(dist / 12);
    // FIX HIGH-1: inter.isFast was never assigned in v2.3 constructor (uses tierKey).
    // Use tierKey to select the correct stroke color for UPPER vs non-UPPER interceptors.
    if (inter.tierKey === 'UPPER') {
      stroke(0, 255, 255, 35);
    } else {
      stroke(0, 180, 255, 30);
    }
    strokeWeight(0.7);
    for (let s = 0; s < segments; s += 2) {
      const t1 = s / segments;
      const t2 = min((s + 1) / segments, 1);
      const x1 = inter.x + dx * t1;
      const y1 = inter.y + dy * t1;
      const x2 = inter.x + dx * t2;
      const y2 = inter.y + dy * t2;
      line(x1, y1, x2, y2);
    }
  }
}

// ── DRAW ENGAGEMENT ZONES (HIMEZ / LOMEZ / SHORADEZ) ─────────────────────────
// Three subtle translucent horizontal bands indicating tiered defense zones
function drawEngagementZones() {
  push();
  noStroke();
  textSize(8);
  textAlign(LEFT);
  for (const tierKey of CFG.TIER_ORDER) {
    const tier = CFG.INT_TIERS[tierKey];
    const yMin = tier.engageYMinFrac * CFG.SIM_H;
    const yMax = tier.engageYMaxFrac * CFG.SIM_H;
    const h = yMax - yMin;
    // Subtle translucent band
    fill(tier.color[0], tier.color[1], tier.color[2], 12);
    rect(0, yMin, CFG.SIM_W, h);
    // Zone boundary line
    stroke(tier.color[0], tier.color[1], tier.color[2], 35);
    strokeWeight(0.5);
    line(0, yMin, CFG.SIM_W, yMin);
    noStroke();
    // Zone label on left margin
    fill(tier.color[0], tier.color[1], tier.color[2], 100);
    text(tier.zoneLabel, 4, yMin + 12);
  }
  pop();
}

// ── DRAW GRID ─────────────────────────────────────────────────────────────────
function drawGrid() {
  push(); strokeWeight(1);
  // Range gridlines (vertical)
  for (let km=0; km<=CFG.RANGE_KM; km+=100) {
    const x = (km/CFG.RANGE_KM) * CFG.SIM_W;
    stroke(0, 60, 18); line(x, 0, x, CFG.SIM_H);
    fill(0, 120, 45); noStroke(); textSize(8); textAlign(CENTER);
    text(`${km}`, x, CFG.SIM_H - 3);
  }
  // Altitude gridlines (horizontal)
  for (let km=0; km<=CFG.ALT_KM; km+=20) {
    const y = CFG.SIM_H - (km/CFG.ALT_KM) * CFG.SIM_H;
    stroke(0, 60, 18); line(0, y, CFG.SIM_W, y);
    fill(0, 110, 40); noStroke(); textSize(8); textAlign(LEFT);
    text(`${km}km`, 3, y - 2);
  }
  // v2.0: Subtle glow at grid intersections
  noStroke();
  for (let km = 0; km <= CFG.RANGE_KM; km += 100) {
    for (let alt = 0; alt <= CFG.ALT_KM; alt += 20) {
      const gx = (km / CFG.RANGE_KM) * CFG.SIM_W;
      const gy = CFG.SIM_H - (alt / CFG.ALT_KM) * CFG.SIM_H;
      fill(0, 255, 65, 8);
      ellipse(gx, gy, 10, 10);
    }
  }

  // Axis labels
  fill(0, 100, 38); textSize(8); textAlign(CENTER);
  text('RANGE (km)', CFG.SIM_W * 0.45, CFG.SIM_H - 3);

  // Threat entry annotation
  fill(255, 60, 60, 100); textSize(8); textAlign(LEFT);
  text('◀ THREAT ENTRY', 6, 12);

  // Protected zone shading
  fill(0, 80, 200, 18); noStroke();
  rect(CFG.SIM_W * 0.84, 0, CFG.SIM_W * 0.16, CFG.SIM_H);
  fill(0, 160, 255, 120); textSize(9); textAlign(CENTER);
  text('DEFENDED', CFG.SIM_W * 0.92, 20);
  text('ZONE', CFG.SIM_W * 0.92, 31);

  // Ground line
  stroke(0, 200, 60, 160); strokeWeight(2);
  line(0, CFG.SIM_H, CFG.SIM_W, CFG.SIM_H);
  pop();
}

// ── DRAW KALMAN TRACK CROSSHAIRS ──────────────────────────────────────────────
function drawTracks() {

// ── DRAW INTERCEPTOR BATTERY SITE ────────────────────────────────────────────
function drawBattery() {
  const bx = CFG.BATT_X_FRAC * CFG.SIM_W;
  push();
  fill(0, 160, 255); noStroke();
  // Square launcher pad symbol
  rect(bx - 8, CFG.SIM_H - 14, 16, 12, 2);
  // Launcher rail lines
  stroke(0, 220, 255); strokeWeight(1.5);
  line(bx - 5, CFG.SIM_H - 14, bx - 5, CFG.SIM_H - 22);
  line(bx,     CFG.SIM_H - 14, bx,     CFG.SIM_H - 24);
  line(bx + 5, CFG.SIM_H - 14, bx + 5, CFG.SIM_H - 22);
  // IMPROVED: THAAD launcher indicator next to standard battery
  fill(0, 255, 255, 100); noStroke();
  rect(bx + 12, CFG.SIM_H - 12, 8, 8, 1);
  stroke(0, 255, 255); strokeWeight(1);
  line(bx + 16, CFG.SIM_H - 12, bx + 16, CFG.SIM_H - 20);
  fill(0, 200, 255); noStroke(); textSize(8); textAlign(CENTER);
  text('SAM/THAAD BATT', bx + 4, CFG.SIM_H + 13);
  pop();
}

// ── DRAW RIGHT PANEL ──────────────────────────────────────────────────────────
function drawPanel() {
  const px = CFG.SIM_W + 12;
  const pw = CFG.W - CFG.SIM_W;
  push();
  fill(2, 10, 4); noStroke(); rect(CFG.SIM_W, 0, pw, CFG.H);
  stroke(0, 120, 40, 100); strokeWeight(1); line(CFG.SIM_W, 0, CFG.SIM_W, CFG.H);

  fill(0, 255, 65); noStroke(); textSize(11); textAlign(LEFT);
  text('LAYERED IAMD COMMAND v2.2', px, 22);
  fill(0, 120, 50); textSize(8);
  text('SLS TIERED INTERCEPT DISPLAY', px, 33);
  stroke(0, 90, 35); line(px, 37, CFG.W-8, 37);

  // SLS ACTIVE indicator — blinks when any threat is in SLS look phase
  const slsActive = slsState.size > 0 && [...slsState.values()].some(s => s.currentTierIndex !== null && frameCount < s.waitingUntil);
  if (slsActive) {
    const blink = (frameCount % 30) < 20;
    if (blink) {
      fill(255, 220, 50, 220); noStroke(); textSize(8);
      text('SLS ACTIVE', px + 140, 33);
    }
  }

  let y = 52;
  const statLine = (label, val, vr=0, vg=255, vb=65) => {
    fill(0, 120, 45); textSize(9); textAlign(LEFT); text(label, px, y);
    fill(vr, vg, vb); textAlign(RIGHT); text(val, CFG.W-10, y);
    textAlign(LEFT); y += 15;
  };
  statLine('WAVE', score.wave);
  statLine('KILLS', score.kills, 0, 255, 100);
  const lc = score.leak > 2 ? [255,70,70] : [255,170,50];
  statLine('LEAKAGE', `${score.leak}/${CFG.MAX_LEAKAGE}`, ...lc);
  statLine('SHOTS FIRED', score.shots, 0, 200, 255);
  // SLS RE-ENGAGE counter moved to TIER STATS section
  const tot = score.kills + score.leak;
  const pct = tot > 0 ? floor((score.kills/tot)*100) : 100;
  statLine('KILL RATE', `${pct}%`, pct>70 ? 0 : 255, pct>70 ? 255 : 80, pct>70 ? 65 : 80);
  statLine('ACTIVE TGT', threats.filter(t => t.alive).length, 255, 180, 50);
  statLine('ACTIVE INT', interceptors.filter(i => i.alive).length, 0, 200, 255);

  y += 1;
  fill(0, 120, 45); textSize(8); text('-- MAGAZINES --', px, y); y += 9;
  for (const tierKey of CFG.TIER_ORDER) {
    const tier = CFG.INT_TIERS[tierKey];
    const c = tier.color;
    fill(c[0], c[1], c[2]); textSize(8); text(`${tierKey} ${score.magazines[tierKey]}/${tier.magazine}`, px, y);
    const barX = px + 74;
    const barW = 80;
    const frac = score.magazines[tierKey] / tier.magazine;
    noFill(); stroke(0, 90, 35); rect(barX, y - 7, barW, 5, 1);
    noStroke(); fill(c[0], c[1], c[2], 180); rect(barX, y - 7, barW * frac, 5, 1);
    y += 10;
  }

  y += 3; stroke(0, 80, 30); line(px, y, CFG.W - 8, y); y += 10;
  fill(0, 160, 55); textSize(8); text('-- TIER STATS --', px, y); y += 10;
  // Column headers
  fill(0, 110, 42); textSize(6.5);
  text('TIER   FIRE  HIT  MISS  SSPK  ACTUAL', px, y); y += 9;
  for (const tierKey of CFG.TIER_ORDER) {
    const s = score.tierStats[tierKey];
    const tier = CFG.INT_TIERS[tierKey];
    const c = tier.color;
    const actualSspk = s.fire > 0 ? (s.hit / s.fire).toFixed(2) : '--';
    fill(c[0], c[1], c[2], 210); textSize(7);
    text(`${tierKey.padEnd(7)} ${String(s.fire).padStart(3)}  ${String(s.hit).padStart(3)}  ${String(s.miss).padStart(3)}  ${tier.sspk.toFixed(2)}  ${actualSspk}`, px, y);
    y += 10;
  }
  // SLS re-engage counter
  fill(255, 220, 110, 190); textSize(7);
  text(`SLS RE-ENGAGE: ${score.slsReengage}`, px, y); y += 10;

  y += 2; stroke(0, 80, 30); line(px, y, CFG.W - 8, y); y += 10;
  fill(0, 160, 55); textSize(8); text('-- KILL FEED --', px, y); y += 10;
  if (killFeed.length === 0) {
    fill(0, 80, 35); textSize(7); text('No intercept assessments yet', px, y); y += 10;
  } else {
    for (const kf of killFeed) {
      const c = getTierColor(kf.tier);
      fill(c[0], c[1], c[2], map(kf.age, 0, 220, 230, 40));
      textSize(7); text(`[${kf.tier}] ${kf.text}`, px, y); y += 9;
      // FIX v2.1-L4: age mutation moved to update phase in draw()
    }
  }

  y += 2; stroke(0, 80, 30); line(px, y, CFG.W - 8, y); y += 10;
  fill(0, 160, 55); textSize(8); text('-- THREAT QUEUE --', px, y); y += 10;
  const tgtList = [];
  const allRadars = [...radars, ewRadar];
  const seenIds = new Set();
  // FIX v2.1-M7: Build threat Map for O(1) lookup in drawPanel threat queue
  const panelThreatMap = new Map(threats.filter(t => t.alive).map(t => [t.id, t]));
  for (const r of allRadars) {
    for (const [id, kf] of r.tracks) {
      if (seenIds.has(id)) continue;
      seenIds.add(id);
      const threat = panelThreatMap.get(id);
      if (!threat) continue;
      const distToBatt = abs(CFG.BATT_X_FRAC * CFG.SIM_W - kf.pos.x);
      const band = getThreatAltitudeBand(kf.pos.y);
      tgtList.push({ type: threat.type, spd: kf.speed, dist: distToBatt, band, engaged: interceptors.some(i => i.alive && i.trackId === id) });
    }
  }
  tgtList.sort((a, b) => a.dist - b.dist);
  const topN = tgtList.slice(0, 4);
  if (topN.length === 0) {
    fill(0, 80, 35); textSize(7); text('No tracked threats', px, y); y += 10;
  } else {
    for (const tgt of topN) {
      const tc = getTierColor(tgt.band);
      fill(tc[0], tc[1], tc[2], 210); textSize(7);
      text(`${tgt.band.slice(0,3)} ${tgt.type.slice(0,4)} Spd:${tgt.spd.toFixed(1)} ${tgt.engaged ? 'ENGAGED' : 'TRACKED'}`, px, y);
      y += 9;
    }
  }

  y += 2; stroke(0, 80, 30); line(px, y, CFG.W-8, y); y += 11;
  fill(0, 160, 55); textSize(8); text('-- SYS PARAMS --', px, y); y += 10;
  fill(0, 110, 42); textSize(7.5);
  const param = (k, v) => { text(`${k}: ${v}`, px, y); y += 9; };
  param('Radar', `${CFG.RADAR_RANGE_PX}px`);
  param('Assess', `${CFG.SLS_ASSESS_DELAY}f`);
  param('Upper', `${CFG.INT_TIERS.UPPER.speed}px/f N${CFG.INT_TIERS.UPPER.navConst}`);
  param('Middle', `${CFG.INT_TIERS.MIDDLE.speed}px/f N${CFG.INT_TIERS.MIDDLE.navConst}`);
  param('Lower', `${CFG.INT_TIERS.LOWER.speed}px/f N${CFG.INT_TIERS.LOWER.navConst}`);

  y += 2; stroke(0, 80, 30); line(px, y, CFG.W-8, y); y += 11;
  fill(0, 160, 55); textSize(8); text('-- LEGEND --', px, y); y += 10;
  const leg = [
    [[255,80,60],  'Ballistic (BSTC)'],
    [[255,160,40], 'Cruise (CRZ)'],
    [[180,80,255], 'Hypersonic (HGV)'],
    [[60,255,180], 'Drone swarm'],
    [CFG.INT_TIERS.UPPER.color,  `UPPER int (Spd:${CFG.INT_TIERS.UPPER.speed} SSPK:${CFG.INT_TIERS.UPPER.sspk})`],
    [CFG.INT_TIERS.MIDDLE.color, `MIDDLE int (Spd:${CFG.INT_TIERS.MIDDLE.speed} SSPK:${CFG.INT_TIERS.MIDDLE.sspk})`],
    [CFG.INT_TIERS.LOWER.color,  `LOWER int (Spd:${CFG.INT_TIERS.LOWER.speed} SSPK:${CFG.INT_TIERS.LOWER.sspk})`],
    [[0,255,65],   'Radar + track'],
    [[255,160,30], 'EW radar'],
  ];
  // Draw small interceptor shape icons next to each tier entry
  for (let li = 0; li < leg.length; li++) {
    // Only draw shape icons for interceptor entries (indices 4, 5, 6)
    if (li >= 4 && li <= 6) {
      const iconY = y + (li * 9) - 3;
      // Icon is drawn after the text loop below
    }
  }
  for (const [c, l] of leg) {
    fill(...c); noStroke(); textSize(7.5); text(l, px, y); y += 9;
  }

  y += 3; stroke(0, 80, 30); line(px, y, CFG.W-8, y); y += 11;
  fill(0, 155, 55); textSize(8); text('-- EVENT LOG --', px, y); y += 10;
  for (const m of log) {
    fill(0, 200, 75, map(m.age, 0, 220, 255, 40));
    textSize(7); text(m.text, px, y); y += 9;
    m.age++;
  }
  log = log.filter(m => m.age < 300);

  stroke(0, 60, 25); line(px, CFG.H-38, CFG.W-8, CFG.H-38);
  fill(0, 90, 38); textSize(7.5); noStroke();
  text('[R] Restart  [+/-] Wave speed', px, CFG.H-26);
  text('[1] Ballistic  [2] Cruise', px, CFG.H-16);
  text('[3] Hypersonic  [4] Drone swarm', px, CFG.H-6);
  pop();
}

// ── GAME OVER OVERLAY ─────────────────────────────────────────────────────────
function drawGameOver() {
  fill(0, 0, 0, 190); noStroke(); rect(0, 0, CFG.SIM_W, CFG.SIM_H);
  fill(255, 50, 50); textSize(34); textAlign(CENTER, CENTER);
  text('DEFENSE FAILED', CFG.SIM_W/2, CFG.SIM_H/2 - 38);
  fill(0, 200, 255); textSize(13);
  text(`${score.leak} impacts sustained — protected zone destroyed`, CFG.SIM_W/2, CFG.SIM_H/2 + 2);
  fill(0, 255, 65); textSize(12);
  text(`Final kill rate: ${score.kills + score.leak > 0 ? floor(score.kills/(score.kills+score.leak)*100) : 100}%   Shots fired: ${score.shots}`, CFG.SIM_W/2, CFG.SIM_H/2 + 24);
  fill(0, 200, 100); textSize(12);
  text('Press [R] to restart', CFG.SIM_W/2, CFG.SIM_H/2 + 52);
  textAlign(LEFT);
}

// ── INIT ──────────────────────────────────────────────────────────────────────
function initGame() {
  _tid        = 0;
  threats     = [];
  interceptors= [];
  particles   = [];
  // Three ground radars placed at different downrange positions for overlapping coverage
  radars = [
    new Radar(0.33, 0),
    new Radar(0.58, 1),
    new Radar(0.78, 2),
  ];
  // IMPROVED v1.2: Elevated early-warning radar for high-altitude threat detection
  ewRadar = new EWRadar();
  score       = {
    wave: 0, kills: 0, leak: 0, shots: 0, slsReengage: 0,
    magazines: {
      UPPER: CFG.INT_TIERS.UPPER.magazine,
      MIDDLE: CFG.INT_TIERS.MIDDLE.magazine,
      LOWER: CFG.INT_TIERS.LOWER.magazine,
    },
    tierStats: {
      UPPER: { fire: 0, hit: 0, miss: 0 },
      MIDDLE: { fire: 0, hit: 0, miss: 0 },
      LOWER: { fire: 0, hit: 0, miss: 0 },
    },
  };
  log         = [];
  killFeed    = [];
  slsState    = new Map();
  screenShake = 0;
  gameOver    = false;
  lastWave    = millis();
  lastC2Frame = 0;
  addLog('SYSTEM NOMINAL - AWAITING THREATS');
  addLog('LAYERED DEFENSE BATTERY ONLINE');
}

// ── P5.JS ENTRY POINTS ────────────────────────────────────────────────────────
function setup() {
  createCanvas(CFG.W, CFG.H);
  textFont('Share Tech Mono');
  initGame();
}

function draw() {
  // v2.0: Screen shake on leakage impact
  // FIX CRITICAL-1 + MEDIUM-4: wrap translate in push()/pop() so it doesn't
  // accumulate across frames (p5 translate is additive without push/pop).
  // Also clip shake to sim viewport only — right-side panel must stay stable.
  // FIX v2.1-L5: Compute delta-time for frame-rate-independent physics
  const now = millis();
  const rawDt = lastFrameTime > 0 ? (now - lastFrameTime) / 16.667 : 1.0; // normalize to ~60fps baseline
  const dt = Math.min(rawDt, 3.0); // cap at 3x to prevent tunneling on tab-refocus
  lastFrameTime = now;

  background(4, 10, 4); // deep phosphor-green-tinted black
  push();
  if (screenShake > 0) {
    // Clip shake translate to sim viewport area only
    translate(random(-3, 3), random(-3, 3));
    screenShake--;
  }
  // Clip all sim-area drawing to viewport so shake can't bleed into panel
  drawingContext.save();
  drawingContext.beginPath();
  drawingContext.rect(0, 0, CFG.SIM_W, CFG.H);
  drawingContext.clip();
  drawGrid();
  drawEngagementZones();

  // ── Wave spawning timer
  if (!gameOver && millis() - lastWave > CFG.WAVE_MS) {
    spawnWave();
    // FIX MED-2: Snap forward to prevent burst-spawning after tab backgrounding
    lastWave = max(millis(), lastWave + CFG.WAVE_MS);
  }

  // ── Threat updates (includes SLS assessment timer decrement)
  const liveDrones = threats.filter(t => t.type==='DRONE' && t.alive);
  for (const t of threats) {
    if (!t.alive) continue;
    if (t.type === 'DRONE') t.update(dt, liveDrones); // FIX HIGH-2: pass dt for frame-rate-independent physics
    else t.update(dt);
    // FIX MEDIUM-3: assessmentTimer decrement removed — field eliminated, dead computation
  }
  threats = threats.filter(t => t.alive);

  // FIX v2.1-H1: Prune ghost tracks — remove radar tracks for dead threats
  // Prevents 63% ghost track accumulation and fixes M9 ghost-target engagement
  {
    const aliveIds = new Set(threats.map(t => t.id));
    for (const r of [...radars, ewRadar]) {
      for (const [id] of r.tracks) {
        if (!aliveIds.has(id)) r.tracks.delete(id);
      }
    }
  }

  // ── Radar tracking (Kalman predict → update, correct order)
  // FIX MEDIUM-2: kf.predict() must run BEFORE radar.update() each frame.
  // Standard Kalman cycle: predict (advance state to time k) → update (apply
  // measurement at time k). Previous order (update then predict) was reversed,
  // causing velocity estimates to lag one frame behind measurements.
  for (const r of [...radars, ewRadar]) {
    for (const [, kf] of r.tracks) kf.predict(dt); // FIX HIGH-2: pass computed dt for frame-rate-independent Kalman predict
  }
  // Now apply measurements at the current (already-predicted) state
  for (const r of radars) r.update(threats);
  ewRadar.update(threats); // IMPROVED v1.2: EW radar updates too

  // ── C2 interceptor assignment (IMPROVED: adaptive cooldown)
  // Check for hypersonic threats more frequently (every 10 frames ≈ 0.17s)
  // Check for standard threats at normal rate (every 30 frames ≈ 0.5s)
  if (!gameOver) {
    const elapsed = frameCount - lastC2Frame;
    // Detect if any active track looks hypersonic (check ground + EW radars)
    let hasHypersonicTrack = false;
    const allRadarSources = [...radars, ewRadar]; // IMPROVED v1.2: include EW radar
    for (const r of allRadarSources) {
      for (const [, kf] of r.tracks) {
        if (kf.speed > CFG.HYPERSONIC_SPD_THRESH) {
          hasHypersonicTrack = true;
          break;
        }
      }
      if (hasHypersonicTrack) break;
    }
    // IMPROVED: adaptive cooldown — fast loop when hypersonic threat detected
    const cooldown = hasHypersonicTrack ? CFG.C2_FAST_COOLDOWN : CFG.C2_STD_COOLDOWN;
    if (elapsed >= cooldown) {
      runC2();
      lastC2Frame = frameCount;
    }
  }

  // ── Interceptor updates (PN guidance)
  for (const i of interceptors) if (i.alive) i.update(dt); // FIX HIGH-2: pass dt for frame-rate-independent PN guidance
  interceptors = interceptors.filter(i => i.alive);

  // ── Outcome check (MOVED v1.4: before drawing so dead objects don't render for 1 frame)
  if (!gameOver) checkCollisions();
  // FIX v1.4: re-filter after collisions to remove newly-killed objects before drawing
  threats = threats.filter(t => t.alive);
  interceptors = interceptors.filter(i => i.alive);

  // FIX v2.1-L4: killFeed aging moved from drawPanel (render) to update phase
  for (const kf of killFeed) kf.age++;
  killFeed = killFeed.filter(k => k.age < 320);

  // ── Particle update + draw
  for (const p of particles) { p.update(); p.draw(); }
  particles = particles.filter(p => !p.dead);

  // ── Draw scene elements (order: trails, bodies, overlays)
  for (const t of threats) if (t.alive) t.draw();
  // v2.0: Drone formation connector lines
  drawDroneFormationLines(threats.filter(t => t.type === 'DRONE'));
  for (const i of interceptors) if (i.alive) i.draw();
  for (const r of radars) r.draw();
  ewRadar.draw(); // IMPROVED v1.2: draw EW radar
  drawBattery();
  drawTracks();
  // v2.0: Engagement lines from interceptors to targets
  drawEngagementLines();

  // ── HUD + panel
  drawingContext.restore(); // end sim-viewport clip (screen shake scope)
  pop(); // end shake push/pop
  drawPanel();
  if (gameOver) drawGameOver();
}

// ── KEYBOARD CONTROLS ─────────────────────────────────────────────────────────
function keyPressed() {
  if (key === 'r' || key === 'R') { initGame(); return; }
  if (key === '1') { spawnWave('ballistic'); }
  if (key === '2') { spawnWave('cruise');    }
  if (key === '3') { spawnWave('hypersonic');}
  if (key === '4') { spawnWave('drone');     }
  // Tune wave tempo (+/- keys)
  if (key === '=' || key === '+') CFG.WAVE_MS = max(2000, CFG.WAVE_MS - 1000);
  if (key === '-' || key === '_') CFG.WAVE_MS = min(30000, CFG.WAVE_MS + 1000);
}
